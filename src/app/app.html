<div class="min-h-dvh bg-gray-50 dark:bg-black">
  <header
    class="flex items-center justify-between border-b border-gray-200 bg-white px-6 py-4 dark:border-gray-800 dark:bg-gray-950"
  >
    <h1 class="text-xl font-semibold text-gray-900 dark:text-gray-100">{{ title() }}</h1>

    <div class="flex items-center gap-3">
      @if (authService.user()) {
        <button
          type="button"
          (click)="authService.signOutUser()"
          class="text-sm text-gray-600 hover:underline dark:text-gray-300"
        >
          Deconectare
        </button>
      }
      <app-theme-switcher />
    </div>
  </header>

  @if (!authService.ready()) {
    <div class="flex min-h-[70vh] items-center justify-center">
      <div
        class="h-8 w-8 animate-spin rounded-full border-2 border-gray-300 border-t-gray-900 dark:border-gray-700 dark:border-t-gray-100"
      ></div>
    </div>
  } @else {
    <router-outlet />
  }
</div>
