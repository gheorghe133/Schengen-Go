<form
  class="flex flex-col gap-3 sm:flex-row sm:flex-wrap sm:items-end sm:gap-4"
  (ngSubmit)="submit()"
>
  <label class="flex flex-col text-sm text-gray-600 dark:text-gray-300">
    Intrare
    <input
      type="date"
      name="entry"
      [(ngModel)]="entry"
      class="rounded-md border border-gray-300 px-3 py-2 dark:border-gray-700 dark:bg-gray-900 dark:text-gray-100 dark:[color-scheme:dark]"
      required
    />
  </label>
  <label class="flex flex-col text-sm text-gray-600 dark:text-gray-300">
    Ieșire
    <input
      type="date"
      name="exit"
      [(ngModel)]="exit"
      class="rounded-md border border-gray-300 px-3 py-2 dark:border-gray-700 dark:bg-gray-900 dark:text-gray-100 dark:[color-scheme:dark]"
      required
    />
  </label>
  <label class="flex flex-col text-sm text-gray-600 dark:text-gray-300">
    Țară
    <select
      name="countryCode"
      [(ngModel)]="countryCode"
      class="rounded-md border border-gray-300 px-3 py-2 dark:border-gray-700 dark:bg-gray-900 dark:text-gray-100"
      required
    >
      <option value="" disabled>Alege țara</option>
      @for (country of countries; track country.code) {
        <option [value]="country.code">{{ country.name }}</option>
      }
    </select>
  </label>
  <button
    type="submit"
    class="shrink-0 rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700"
  >
    Adaugă călătorie
  </button>
</form>

@if (error) {
  <p class="mt-2 text-sm text-red-600 dark:text-red-400">{{ error }}</p>
}
